# Focused Boyue collection config.
#
# Source selection:
# - First 10 models from
#   docs/2026_04_24_11_44_boyue_openrouter_model_recommendations.md
# - Plus requested additions: Claude Opus 4.7 and GPT-5.5
#
# Notes:
# - Entries copied from models_boyue.yaml keep the same endpoint and request settings.
# - The requested additions are now covered by aliases.json and have been
#   collected successfully in out/fingerprints_boyue_priority13_final.

collection:
  probe_set_version: v2
  default_budget: cheap
  reference_mode: internal_gateway

models:
  # ---- Priority Top 10 -------------------------------------------------------
  - canonical_id: anthropic/claude-sonnet-4-6
    endpoint: https://api.boyuerichdata.opensphereai.com/v1
    model_id: claude-sonnet-4-6
    key_env: OPENAI_API_KEY
    request_omit_fields:
      - top_p
    enabled: true

  - canonical_id: google/gemini-3-flash-preview
    endpoint: https://api.boyuerichdata.opensphereai.com/v1
    model_id: gemini-3-flash-preview
    key_env: OPENAI_API_KEY
    request_overrides:
      extra_body:
        google:
          thinking_config:
            thinking_budget: 0
    enabled: true

  - canonical_id: anthropic/claude-opus-4-6
    endpoint: https://api.boyuerichdata.opensphereai.com/v1
    model_id: claude-opus-4-6
    key_env: OPENAI_API_KEY
    request_omit_fields:
      - top_p
    enabled: true

  - canonical_id: google/gemini-3-pro-preview
    endpoint: https://api.boyuerichdata.opensphereai.com/v1
    model_id: gemini-3-pro-preview
    key_env: OPENAI_API_KEY
    request_overrides:
      extra_body:
        google:
          thinking_config:
            thinking_budget: 0
    enabled: true

  - canonical_id: google/gemini-3.1-pro-preview
    endpoint: https://api.boyuerichdata.opensphereai.com/v1
    model_id: gemini-3.1-pro-preview
    key_env: OPENAI_API_KEY
    request_overrides:
      max_completion_tokens: 3072
    # Boyue does not honor thinking_budget=0 for Gemini 3.1 Pro Preview, but
    # a larger completion budget prevents reasoning tokens from truncating output.
    enabled: true

  - canonical_id: google/gemini-2.5-flash
    endpoint: https://api.boyuerichdata.opensphereai.com/v1
    model_id: gemini-2.5-flash
    key_env: OPENAI_API_KEY
    request_overrides:
      extra_body:
        google:
          thinking_config:
            thinking_budget: 0
    enabled: true

  - canonical_id: google/gemini-2.5-flash-lite
    endpoint: https://api.boyuerichdata.opensphereai.com/v1
    model_id: gemini-2.5-flash-lite
    key_env: OPENAI_API_KEY
    request_overrides:
      extra_body:
        google:
          thinking_config:
            thinking_budget: 0
    enabled: true

  - canonical_id: google/gemini-2.5-pro
    endpoint: https://api.boyuerichdata.opensphereai.com/v1
    model_id: gemini-2.5-pro
    key_env: OPENAI_API_KEY
    request_overrides:
      max_completion_tokens: 3072
    # Gemini 2.5 Pro needs a larger completion budget on Boyue; probe defaults
    # often get consumed by reasoning tokens and return empty output.
    # Boyue still reports reasoning_tokens with thinking_budget=0, so keep
    # the larger budget instead of adding a no-op thinking override.
    enabled: true

  - canonical_id: openai/gpt-5.4
    endpoint: https://api.boyuerichdata.opensphereai.com/v1
    model_id: gpt-5.4
    key_env: OPENAI_API_KEY
    enabled: true

  - canonical_id: openai/gpt-5.4-mini
    endpoint: https://api.boyuerichdata.opensphereai.com/v1
    model_id: gpt-5.4-mini
    key_env: OPENAI_API_KEY
    request_overrides:
      reasoning_effort: low
      max_completion_tokens: 2048
    request_omit_fields:
      - temperature
    enabled: true

  - canonical_id: openai/gpt-5.3-codex
    endpoint: https://api.boyuerichdata.opensphereai.com/v1
    model_id: gpt-5.3-codex
    key_env: OPENAI_API_KEY
    request_overrides:
      reasoning_effort: low
      max_completion_tokens: 2048
    enabled: true

  # ---- Requested Additions ---------------------------------------------------
  - canonical_id: anthropic/claude-opus-4-7
    endpoint: https://api.boyuerichdata.opensphereai.com/v1
    model_id: claude-opus-4-7
    key_env: OPENAI_API_KEY
    request_omit_fields:
      - temperature
      - top_p
    request_overrides:
      max_completion_tokens: 2048
    enabled: true

  - canonical_id: openai/gpt-5.5
    endpoint: https://api.boyuerichdata.opensphereai.com/v1
    model_id: gpt-5.5
    key_env: OPENAI_API_KEY
    enabled: true
