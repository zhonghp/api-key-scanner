name: weekly-fingerprint-collect

# Manual-dispatch only while we iterate on the internal gateway. When the
# model set stabilizes, re-enable the `schedule` trigger (cron: "0 2 * * 1")
# to run every Monday 02:00 UTC. Pass --only <canonical_id> through inputs
# to collect a single model without burning budget on the full set.

on:
  workflow_dispatch:
    inputs:
      only:
        description: Canonical id to collect (blank = all enabled)
        required: false
        default: ""
      release_tag:
        description: Override release tag (default fingerprint-YYYY-MM-DD)
        required: false
        default: ""

permissions:
  contents: write   # create GitHub Release
  id-token: write   # for Sigstore keyless signing (future step)

jobs:
  collect:
    name: collect + sign + release
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: sync deps
        run: uv sync --all-extras

      - name: run collection
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          APIGUARD_ACCOUNT_TIER: ${{ vars.APIGUARD_ACCOUNT_TIER || 'unspecified' }}
          APIGUARD_REGION: ${{ vars.APIGUARD_REGION || 'unspecified' }}
        run: |
          only_flag=""
          if [ -n "${{ inputs.only }}" ]; then
            only_flag="--only ${{ inputs.only }}"
          fi
          uv run python scripts/collect_all.py \
            --config models.yaml \
            --out ./out/fingerprints \
            --env-file /dev/null \
            --fail-on-empty \
            $only_flag

      - name: generate manifest
        run: |
          uv run python scripts/generate_manifest.py ./out/fingerprints \
            --require-models 1

      - name: validate
        run: uv run python scripts/validate_fingerprints.py ./out/fingerprints

      - name: compute release tag
        id: tag
        run: |
          if [ -n "${{ inputs.release_tag }}" ]; then
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=fingerprint-$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: sigstore sign manifest
        # Keyless signing — no secrets to manage. Produces MANIFEST.json.sigstore.
        # Downstream verify_gateway clients will check this against our OIDC
        # issuer + repo identity before trusting the data. upload-signing-
        # artifacts must stay true: without it the sigstore file is written
        # to a temp area and the later release step's files: glob can't find it.
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: ./out/fingerprints/MANIFEST.json
          upload-signing-artifacts: true

      - name: create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Fingerprint snapshot ${{ steps.tag.outputs.tag }}
          generate_release_notes: false
          body: |
            Weekly fingerprint snapshot produced by the automated collection
            workflow. Use this as a reference dataset with verify_gateway.
            Verify with: `sigstore verify identity --cert-oidc-issuer ... MANIFEST.json`
          files: |
            ./out/fingerprints/**/*.jsonl
            ./out/fingerprints/MANIFEST.json*

      - name: regenerate SUPPORTED_MODELS.md
        # Must run AFTER the release is created so we never commit a table
        # pointing at a tag that never shipped.
        run: |
          uv run python scripts/generate_supported_models.py \
            --manifest ./out/fingerprints/MANIFEST.json \
            --models-yaml models.yaml \
            --release-tag ${{ steps.tag.outputs.tag }} \
            --out SUPPORTED_MODELS.md

      - name: commit updated SUPPORTED_MODELS.md
        # Best-effort: the GitHub-Actions bot cannot push to `main` under the
        # current branch-protection policy (PRs required). When the push is
        # rejected, the release itself is still the source of truth — the
        # MANIFEST.json inside the Release is what clients consume. An admin
        # can later push the updated SUPPORTED_MODELS.md by hand or via a
        # follow-up PR. Marking continue-on-error so the whole workflow stays
        # green as long as the release was published successfully.
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SUPPORTED_MODELS.md
          if git diff --cached --quiet; then
            echo "[supported-models] no changes to commit"
            exit 0
          fi
          git commit -m "docs: auto-update SUPPORTED_MODELS.md for ${{ steps.tag.outputs.tag }}

          Regenerated by weekly-fingerprint-collect.yml from the freshly
          produced MANIFEST.json. Do not edit by hand — the next workflow
          run will overwrite it."
          if ! git push origin HEAD:main 2>&1; then
            echo "::warning::push to main rejected (likely branch protection)."
            echo "::warning::the release ${{ steps.tag.outputs.tag }} is authoritative;"
            echo "::warning::an admin can sync SUPPORTED_MODELS.md manually:"
            echo "::warning::  gh release download ${{ steps.tag.outputs.tag }} --pattern MANIFEST.json --dir /tmp/fp"
            echo "::warning::  uv run python scripts/generate_supported_models.py --manifest /tmp/fp/MANIFEST.json --release-tag ${{ steps.tag.outputs.tag }}"
            echo "::warning::  git add SUPPORTED_MODELS.md && git commit && git push"
            exit 1  # still fail the step; continue-on-error keeps job green
          fi
