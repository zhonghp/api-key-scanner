# Fingerprint collection targets.
#
# Consumed by scripts/collect_all.py (M3 batch collection driver) and by
# .github/workflows/weekly-fingerprint-collect.yml (scheduled runner).
#
# Each entry describes ONE model to collect from its VENDOR DIRECT endpoint.
# - canonical_id: must be in aliases.json's canonical[] list; the file written
#                 is fingerprints/<vendor>/<model>.jsonl
# - endpoint:     OpenAI-compatible base URL
# - model_id:     the string the vendor's API accepts in the `model` field
# - key_env:      NAME of env var holding the API key (NOT the key itself)
# - budget:       cheap | standard | deep (see probes.py _BUDGET_PROBE_COUNT)
# - enabled:      set false to skip without deleting the entry
#
# Keys must be in the runner's environment (GitHub Secrets in CI). Missing
# keys cause that model to be skipped with a warning; the run doesn't fail.

collection:
  probe_set_version: v1
  # Default budget for entries that don't override. Keep modest — weekly cost
  # scales linearly with this.
  default_budget: standard

models:
  # OpenAI family — only gpt-5.4 variants are active; everything else is
  # disabled while we iterate on the internal gateway.
  - canonical_id: openai/gpt-5.4
    endpoint: https://aigateway.edgecloudapp.com/v1/f194fd69361cd590f1fa136c9c90eca1/senseai
    model_id: gpt-5.4
    key_env: OPENAI_API_KEY
    enabled: true

  - canonical_id: openai/gpt-5.4-mini
    endpoint: https://aigateway.edgecloudapp.com/v1/f194fd69361cd590f1fa136c9c90eca1/senseai
    model_id: gpt-5.4-mini
    key_env: OPENAI_API_KEY
    enabled: true

  - canonical_id: openai/gpt-4o
    endpoint: https://api.openai.com/v1
    model_id: gpt-4o
    key_env: OPENAI_API_KEY
    enabled: false

  - canonical_id: openai/gpt-4o-mini
    endpoint: https://api.openai.com/v1
    model_id: gpt-4o-mini
    key_env: OPENAI_API_KEY
    enabled: false

  - canonical_id: openai/gpt-5
    endpoint: https://api.openai.com/v1
    model_id: gpt-5
    key_env: OPENAI_API_KEY
    enabled: false

  - canonical_id: openai/gpt-5-mini
    endpoint: https://api.openai.com/v1
    model_id: gpt-5-mini
    key_env: OPENAI_API_KEY
    enabled: false

  # Anthropic family — uses OpenAI-compatible endpoint (Anthropic's compat mode)
  - canonical_id: anthropic/claude-opus-4
    endpoint: https://api.anthropic.com/v1/openai
    model_id: claude-opus-4
    key_env: ANTHROPIC_API_KEY
    enabled: false

  - canonical_id: anthropic/claude-sonnet-4
    endpoint: https://api.anthropic.com/v1/openai
    model_id: claude-sonnet-4
    key_env: ANTHROPIC_API_KEY
    enabled: false

  - canonical_id: anthropic/claude-haiku-4.5
    endpoint: https://api.anthropic.com/v1/openai
    model_id: claude-haiku-4.5
    key_env: ANTHROPIC_API_KEY
    enabled: false

  # Google family
  - canonical_id: google/gemini-2.5-pro
    endpoint: https://generativelanguage.googleapis.com/v1beta/openai
    model_id: gemini-2.5-pro
    key_env: GOOGLE_API_KEY
    enabled: false

  - canonical_id: google/gemini-2.5-flash
    endpoint: https://generativelanguage.googleapis.com/v1beta/openai
    model_id: gemini-2.5-flash
    key_env: GOOGLE_API_KEY
    enabled: false

  # Open-source reference model (Meta Llama via any OpenAI-compat host)
  - canonical_id: meta/llama-3.3-70b
    endpoint: https://api.together.xyz/v1
    model_id: meta-llama/Meta-Llama-3.3-70B-Instruct
    key_env: TOGETHER_API_KEY
    enabled: false
