# Fingerprint collection targets.
#
# Consumed by scripts/collect_all.py (M3 batch collection driver) and by
# .github/workflows/weekly-fingerprint-collect.yml (scheduled runner).
#
# Each entry describes ONE model to collect. All current entries route
# through the shared internal gateway (aigateway.edgecloudapp.com)
# against one API key (OPENAI_API_KEY env var), which — per the gateway
# owner — proxies requests to the right upstream vendor based on the
# `model` field we send. Note that reference fingerprints collected
# this way carry whatever substitution the gateway might be doing;
# see PR #3 for the plan to track non-vendor-direct references separately.
#
# Field semantics:
# - canonical_id: must be in aliases.json's canonical[] list; the file
#                 written is fingerprints/<vendor>/<model>.jsonl
# - endpoint:     gateway/provider base URL; api_format=auto will probe native
#                 Claude/Gemini paths before falling back to /chat/completions
# - model_id:     the string this endpoint accepts in the `model` field
# - key_env:      NAME of env var holding the API key (NOT the key itself)
# - budget:       cheap | standard (see probes.py _BUDGET_CONFIG)
# - enabled:      set false to skip without deleting the entry. Disabled
#                 entries carry an inline `# disabled: <reason>` comment
#                 pointing at tracking issue #4 (reasoning / implicit-
#                 thinking / gateway-failing models). Follow the re-enable
#                 procedure in that issue to un-mute them.
#
# The key must be in the runner's environment (GitHub Secrets in CI).
# Missing key -> whole run fails (since all entries share one key). If
# a specific model_id isn't registered on the gateway, that single
# entry gets skipped with a 404 warning; the run continues.

collection:
  probe_set_version: v2
  # Default budget for entries that don't override. Keep modest — weekly
  # cost scales linearly with this. `standard` = 258 calls (full MET paper
  # N=250 + 8 banner probes); `cheap` = 18 calls (smoke test). Override on
  # a per-entry basis with `budget: standard` where a specific model
  # warrants the full protocol.
  default_budget: cheap
  # Default to protocol auto-detection so the same model config can move
  # between OpenAI-compatible gateways and native Claude/Gemini endpoints.
  default_api_format: auto
  default_auth_scheme: default

models:
  # ---- OpenAI family ---------------------------------------------------------
  - canonical_id: openai/gpt-4.1
    endpoint: https://aigateway.edgecloudapp.com/v1/f194fd69361cd590f1fa136c9c90eca1/senseai
    model_id: gpt-4.1
    key_env: OPENAI_API_KEY
    enabled: true

  - canonical_id: openai/gpt-4.1-mini
    endpoint: https://aigateway.edgecloudapp.com/v1/f194fd69361cd590f1fa136c9c90eca1/senseai
    model_id: gpt-4.1-mini
    key_env: OPENAI_API_KEY
    enabled: true

  - canonical_id: openai/o3
    endpoint: https://aigateway.edgecloudapp.com/v1/f194fd69361cd590f1fa136c9c90eca1/senseai
    model_id: o3
    key_env: OPENAI_API_KEY
    request_overrides:
      reasoning_effort: low
      max_completion_tokens: 2048
    # disabled: reasoning model — default thinking exhausts max_tokens (2/18 samples) — #4
    enabled: true

  - canonical_id: openai/o4-mini
    endpoint: https://aigateway.edgecloudapp.com/v1/f194fd69361cd590f1fa136c9c90eca1/senseai
